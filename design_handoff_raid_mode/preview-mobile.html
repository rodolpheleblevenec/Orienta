<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RAID mobile — aperçu</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<link rel="stylesheet" href="_ds/orienta-design-system-50c4c1e5-2443-4efb-b2da-de028d449ba2/styles.css">
<script src="_ds/orienta-design-system-50c4c1e5-2443-4efb-b2da-de028d449ba2/_ds_bundle.js"></script>
<link rel="stylesheet" href="raid.css">
<link rel="stylesheet" href="raid-mobile.css">
<style>
  html,body{margin:0;background:#dfe1e3;font-family:var(--sans,system-ui)}
  .wrap{display:flex;flex-wrap:wrap;gap:24px 28px;padding:40px;align-items:flex-start}
  .cell{display:flex;flex-direction:column;align-items:center;gap:10px}
  .cap{font-family:var(--display);font-weight:800;font-size:15px;color:#3a4250}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="raid-parts.jsx"></script>
<script type="text/babel" src="raid-mobile.jsx"></script>
<script type="text/babel" data-presets="react">
  function mount(){
    const DS=window.OrientaDesignSystem_50c4c1;
    const {IOSDevice,MLobby,MLobbyChat,MCombatBoard,MCombatChat,MCinematic,MResult}=window;
    if(!DS||!IOSDevice||!MLobby){setTimeout(mount,40);return;}
    const fx=0.3;
    function Cell({cap,dark,children}){return(<div className="cell"><div className="cap">{cap}</div><IOSDevice dark={dark}>{children}</IOSDevice></div>);}
    function All(){return(<div className="wrap">
      <Cell cap="Lobby · Rôles"><MLobby fx={fx}/></Cell>
      <Cell cap="Lobby · Chat"><MLobbyChat fx={fx}/></Cell>
      <Cell cap="Combat · Plateau"><MCombatBoard fx={fx} shards/></Cell>
      <Cell cap="Combat · Chat"><MCombatChat fx={fx}/></Cell>
      <Cell cap="Cinématique" dark><MCinematic fx={fx}/></Cell>
      <Cell cap="Résultat · victoire"><MResult won/></Cell>
      <Cell cap="Résultat · défaite"><MResult won={false}/></Cell>
    </div>);}
    ReactDOM.createRoot(document.getElementById('root')).render(<All/>);
  }
  mount();
</script>
</body>
</html>
