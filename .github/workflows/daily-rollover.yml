name: Rollover quotidien (gagnant + grille du jour)

on:
  schedule:
    # 01h00 UTC = 02h (hiver) / 03h (été) à Paris — toujours APRÈS minuit Paris,
    # quelle que soit la saison (évite l'off-by-one DST), et après tout le reste de la nuit.
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Date à finaliser (YYYY-MM-DD) — laisser vide pour hier (heure de Paris)'
        required: false

jobs:
  rollover:
    runs-on: ubuntu-latest
    steps:
      - name: Appeler la Edge Function daily-rollover
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          FUNCTION_SECRET: ${{ secrets.FUNCTION_SECRET }}
          INPUT_DATE: ${{ github.event.inputs.date }}
        run: |
          set -euo pipefail

          # 1) Garde-fou : secret obligatoire non vide (sinon URL malformée → curl exit 3,
          #    panne muette type 2026-06-07/08). On échoue avec un message explicite.
          if [ -z "${SUPABASE_URL}" ]; then
            echo "❌ Le secret de dépôt SUPABASE_URL est vide ou absent."
            echo "   → Settings → Secrets and variables → Actions → SUPABASE_URL = https://<ref>.supabase.co"
            exit 1
          fi

          DATE_PARAM=""
          if [ -n "${INPUT_DATE}" ]; then
            DATE_PARAM="?date=${INPUT_DATE}"
          fi

          # 2) Appel. On capture SÉPARÉMENT le code de sortie curl (transport) et le code HTTP.
          CURL_EXIT=0
          HTTP_STATUS=$(curl -sS -o /tmp/response.json -w "%{http_code}" \
            -X POST \
            "${SUPABASE_URL}/functions/v1/daily-rollover${DATE_PARAM}" \
            -H "Authorization: Bearer ${FUNCTION_SECRET}" \
            -H "Content-Type: application/json") || CURL_EXIT=$?

          echo "curl exit: ${CURL_EXIT} — HTTP status: ${HTTP_STATUS}"
          echo "Réponse :"; cat /tmp/response.json 2>/dev/null || true; echo

          # 3) curl n'a pas pu joindre la fonction (URL/DNS/réseau).
          if [ "${CURL_EXIT}" -ne 0 ]; then
            echo "❌ curl a échoué (code ${CURL_EXIT}) — fonction injoignable. Vérifie SUPABASE_URL."
            exit 1
          fi

          # 4) La fonction a répondu, mais en erreur HTTP.
          if [ "${HTTP_STATUS}" -ge 400 ]; then
            echo "❌ La Edge Function a renvoyé HTTP ${HTTP_STATUS} (401 = FUNCTION_SECRET non concordant, 404 = non déployée)."
            exit 1
          fi

          # 5) HTTP 2xx mais corps métier en échec (success != true).
          if ! grep -Eq '"success"[[:space:]]*:[[:space:]]*true' /tmp/response.json; then
            echo "❌ Réponse 2xx mais sans \"success\":true — rollover non confirmé."
            exit 1
          fi

          echo "✅ Rollover quotidien effectué avec succès"
